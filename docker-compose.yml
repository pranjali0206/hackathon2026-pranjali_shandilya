version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: uvicorn api:app --host 0.0.0.0 --port 8000
  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    command: python -m streamlit run app.py --server.port 8501 --server.address 0.0.0.0